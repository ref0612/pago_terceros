services:
  - type: web
    name: pullman-pago-empresarios
    env: static
    buildCommand: echo "No build step required"
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /style.css
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /script.js
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html