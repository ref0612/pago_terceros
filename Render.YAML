services:
  - type: web
    name: pullman-pago-empresarios
    env: node
    plan: free
    buildCommand: echo "No build step"
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_USER
        sync: false
      - key: APP_PASS
        sync: false
      - key: APP_SECRET
        sync: false
      - key: KONNECT_BEARER_TOKEN
        sync: false
      - key: KONNECT_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
